<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Sneaker Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
    }

    .cart {
      cursor: pointer;
    }

    .container {
      padding: 30px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 10px;
    }

    .price {
      color: red;
      font-weight: bold;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      background: black;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #444;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #111;
      color: white;
    }
  </style>
</head>
<body>

<header>
  <h1>Sneaker Store</h1>
  <div class="cart">🛒 Giỏ hàng: <span id="cart-count">0</span></div>
</header>

<div class="container" id="product-list"></div>

<footer>
  © 2026 Sneaker Store Demo
</footer>

<script>
  const products = [
    {
      name: "Nike Air Force 1",
      price: 2500000,
      img: "https://static.nike.com/a/images/c_limit,w_592,f_auto/t_product_v1/3d280b47-f5cb-418b-b4a3-0299b18c442f/WMNS+AIR+FORCE+1+%2707+LX.png"
    },
    {
      name: "Adidas Ultraboost",
      price: 3200000,
      img: "https://tse1.mm.bing.net/th/id/OIP.ONgRkHtXzwApas_EjF5u6AHaFM?rs=1&pid=ImgDetMain&o=7&rm=3"
    },
    {
      name: "Converse Chuck 70",
      price: 1800000,
      img: "https://akn-converse.a-cdn.akinoncloud.com/products/2023/03/28/15159/13fec5f1-0cec-4b02-b488-360f003cb31c_size1340x1000_cropBottom.jpg"
    },
    {
      name: "Puma RS-X",
      price: 2700000,
      img: "https://images.puma.com/image/upload/f_auto,q_auto,b_rgb:fafafa,w_2000,h_2000/global/398210/02/sv01/fnd/IND/fmt/png/RS-X-Heritage-Sneakers"
    }
  ];

  let cart = 0;

  function renderProducts() {
    const list = document.getElementById("product-list");

    products.forEach(p => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p class="price">${p.price.toLocaleString()} VNĐ</p>
        <button onclick="addToCart()">Thêm vào giỏ</button>
      `;

      list.appendChild(card);
    });
  }

  function addToCart() {
    cart++;
    document.getElementById("cart-count").innerText = cart;
  }

  renderProducts();
</script>

</body>
</html>
