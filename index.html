<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Sneaker Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart {
      cursor: pointer;
    }

    .container {
      padding: 30px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    button {
      padding: 10px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

    /* CART POPUP */
    .cart-popup {
      position: fixed;
      right: 0;
      top: 0;
      width: 300px;
      height: 100%;
      background: white;
      box-shadow: -3px 0 10px rgba(0,0,0,0.2);
      padding: 20px;
      display: none;
      flex-direction: column;
    }

    .cart-popup h2 {
      margin-top: 0;
    }

    .cart-item {
      border-bottom: 1px solid #ddd;
      padding: 10px 0;
    }

    .total {
      font-weight: bold;
      margin-top: 10px;
    }

    .checkout {
      margin-top: auto;
      background: green;
    }

    .close {
      background: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<header>
  <h1>Sneaker Store</h1>
  <div class="cart" onclick="toggleCart()">
    🛒 <span id="cart-count">0</span>
  </div>
</header>

<div class="container" id="product-list"></div>

<!-- CART -->
<div class="cart-popup" id="cart">
  <h2>Giỏ hàng</h2>
  <div id="cart-items"></div>
  <div class="total" id="total"></div>

  <button class="checkout" onclick="checkout()">Thanh toán</button>
  <button class="close" onclick="toggleCart()">Đóng</button>
</div>

<script>
const products = [
  { name: "Nike Air Force 1", price: 2500000 },
  { name: "Adidas Ultraboost", price: 3200000 },
  { name: "Converse Chuck 70", price: 1800000 },
  { name: "Puma RS-X", price: 2700000 }
];

let cart = [];

function renderProducts() {
  const list = document.getElementById("product-list");

  products.forEach((p, index) => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${p.name}</h3>
      <p>${p.price.toLocaleString()} VNĐ</p>
      <button onclick="addToCart(${index})">Thêm vào giỏ</button>
    `;

    list.appendChild(div);
  });
}

function addToCart(index) {
  cart.push(products[index]);
  updateCart();
}

function updateCart() {
  document.getElementById("cart-count").innerText = cart.length;

  const cartItems = document.getElementById("cart-items");
  cartItems.innerHTML = "";

  let total = 0;

  cart.forEach(item => {
    total += item.price;

    cartItems.innerHTML += `
      <div class="cart-item">
        ${item.name} - ${item.price.toLocaleString()} VNĐ
      </div>
    `;
  });

  document.getElementById("total").innerText =
    "Tổng: " + total.toLocaleString() + " VNĐ";
}

function toggleCart() {
  const cartBox = document.getElementById("cart");
  cartBox.style.display =
    cartBox.style.display === "flex" ? "none" : "flex";
}

function checkout() {
  if (cart.length === 0) {
    alert("Giỏ hàng trống!");
    return;
  }

  alert("Thanh toán thành công! (demo)");
  cart = [];
  updateCart();
  toggleCart();
}

renderProducts();
</script>

</body>
</html>
